name: CI/CD Pipeline

on:
  push:
    branches: [ main, staging, dev ]
  pull_request:
    branches: [ main, staging ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/kirubanithi10/devops-python-app

jobs:

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app.py --max-line-length=100

      - name: Run pytest
        run: pytest tests/ -v

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev'
    environment:
      name: dev
    steps:
      - name: Simulate dev deploy
        run: |
          echo "Deploying image ${{ needs.build.outputs.image_tag }} to DEV"
          echo "Dev URL: https://dev.devops-python-app.example.com"
          echo "Deploy successful!"

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
    steps:
      - name: Simulate staging deploy
        run: |
          echo "Deploying image ${{ needs.build.outputs.image_tag }} to STAGING"
          echo "Staging URL: https://staging.devops-python-app.example.com"
          echo "Deploy successful!"

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Simulate production deploy
        run: |
          echo "Deploying image ${{ needs.build.outputs.image_tag }} to PRODUCTION"
          echo "Production URL: https://devops-python-app.example.com"
          echo "Deploy successful!"
