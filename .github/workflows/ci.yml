name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (flake8)
        run: |
          pip install flake8
          flake8 app.py --max-line-length=100

      - name: Run tests
        run: |
          pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check secret is loaded
        run: |
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "SECRET IS EMPTY"
          else
            echo "SECRET IS LOADED OK"
          fi

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t kirubanithi10/devops-python-app:latest .
          docker push kirubanithi10/devops-python-app:latest

      - name: Test container runs
        run: |
          docker run -d -p 5000:5000 --name test-container kirubanithi10/devops-python-app:latest
          sleep 3
          curl http://localhost:5000
          docker stop test-container
